      const baseStyle = "flex items-center justify-center px-3 py-1.5 rounded text-sm font-medium transition-colors cursor-pointer";
      const types = {
        primary: "bg-blue-600 text-white hover:bg-blue-700",
        default: "bg-white text-gray-700 border border-gray-300 hover:bg-gray-50",
        danger: "bg-red-50 text-red-600 hover:bg-red-100 border border-red-100",
        text: "bg-transparent text-blue-600 hover:text-blue-800 px-1 py-0",
      };
      return (
        <button className={`${baseStyle} ${types[type]} ${className}`} onClick={onClick}>
          {Icon && <Icon className="w-4 h-4 mr-1.5" />}
          {children}
        </button>
      );
    };

    const Input = ({ label, placeholder }) => (
      <div className="flex flex-col space-y-1 w-full">
        {label && <label className="text-xs text-gray-500">{label}</label>}
